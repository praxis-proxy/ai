name: Tests (Integration)

# ------------------------------------------------------------------------------
# Workflow Settings
# ------------------------------------------------------------------------------

on:
  push:
    branches: [main]
    paths:
      - "apis/**"
      - "filters/**"
      - "server/**"
      - "tests/**"
      - "examples/configs/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Makefile"
      - ".github/workflows/integration.yaml"
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - "apis/**"
      - "filters/**"
      - "server/**"
      - "tests/**"
      - "examples/configs/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Makefile"
      - ".github/workflows/integration.yaml"
  merge_group:
    branches: [main]
  workflow_dispatch:
    inputs:
      debug:
        description: "Enable verbose test output (V=1)"
        required: false
        type: boolean
        default: false
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions: {}

env:
  CARGO_TERM_COLOR: always
  V: ${{ inputs.debug && '1' || '' }}

jobs:
  # ----------------------------------------------------------------------------
  # Path filter for merge_group (which does not support on.paths)
  # ----------------------------------------------------------------------------

  changes:
    if: github.event_name == 'merge_group'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Detect relevant path changes
        id: filter
        run: |
          CHANGED=$(git diff --name-only "${{ github.event.merge_group.base_sha }}" \
                                         "${{ github.event.merge_group.head_sha }}" -- \
            'apis/' \
            'filters/' \
            'server/' \
            'tests/' \
            'examples/configs/' \
            'Cargo.toml' \
            'Cargo.lock' \
            'Makefile' \
            '.github/workflows/integration.yaml')
          if [ -n "$CHANGED" ]; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

  # ----------------------------------------------------------------------------
  # Integration test suites (tests/ crates)
  # ----------------------------------------------------------------------------

  test:
    needs: [changes]
    if: |
      always() &&
      (needs.changes.result == 'skipped' || needs.changes.outputs.relevant == 'true')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@6190aa5fb88a88ee71c12769924bbe63a9ab152e # 1.96.0

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-rust-1.96.0-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-1.96.0-cargo-
          save-always: true

      - name: Schema tests
        run: make test-schema

      - name: Integration tests
        run: make test-integration
