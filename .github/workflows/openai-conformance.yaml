name: OpenAI Conformance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  conformance:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@6190aa5fb88a88ee71c12769924bbe63a9ab152e # 1.96.0

      - name: Install Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.0.0
        with:
          go-version: "1.26.x"

      - name: Install pinned oasdiff
        run: go install github.com/oasdiff/oasdiff@v1.23.0

      - name: Verify pinned OpenAI reference
        run: cargo xtask openai-conformance-reference --check

      - name: Regenerate conformance report
        run: >-
          cargo xtask openai-conformance
          --output-json docs/conformance/openai-conformance-report.json

      - name: Check generated artifacts
        run: >-
          git diff --exit-code --
          docs/conformance/openai-conformance-report.json
          docs/conformance/specs/openai-openapi.yaml
          docs/conformance/specs/openai-openapi-source.json
