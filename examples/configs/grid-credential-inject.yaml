# Grid Credential Injection
#
# Routes a model with grid_route and injects the provider credential selected
# by that route using grid_credential_inject.
#
# The route candidate carries only a credential reference:
#
#   credential.strategy
#   credential.secretRef.name
#   credential.secretRef.namespace
#   credential.secretRef.key
#
# grid_credential_inject resolves that reference from its local credential
# config and adds Authorization: Bearer <token> before load_balancer forwards
# the request upstream.
#
# Production deployments should prefer `file` with a mounted Kubernetes Secret
# volume so token bytes stay out of Praxis ConfigMaps. This example uses
# `value` only so it is self-contained and parseable.

listeners:
  - name: proxy
    address: "127.0.0.1:8080"
    filter_chains:
      - main

filter_chains:
  - name: main
    filters:
      - filter: json_body_field
        field: model
        header: X-Model

      - filter: grid_route
        local_site: edge-us-east
        model_header: X-Model
        candidates:
          - kind: inference_model
            name: hosted-api-model
            site: provider-east
            cluster: provider-east-api
            fresh: true
            credential:
              strategy: bearer_token
              secretRef:
                name: provider-east-token
                namespace: grid-system
                key: token

      - filter: grid_credential_inject
        credentials:
          - name: provider-east-token
            namespace: grid-system
            key: token
            strategy: bearer_token
            value: example-token

      - filter: load_balancer
        clusters:
          - name: provider-east-api
            endpoints:
              - "127.0.0.1:3000"
