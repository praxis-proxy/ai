# Grid Route: Inference Model Routing
#
# Routes requests to different upstream clusters based on the inference
# model name extracted from a configured request header.  The header
# value is set by an earlier filter such as `json_body_field`.
#
# `grid_route` selects a candidate by static scoring and writes the
# cluster name into `ctx.cluster`.  The downstream `load_balancer` reads
# that cluster.  No `router` filter is required between them.
#
# Scoring: fresh > stale, local-site > remote on equal freshness.
# First configured candidate wins on equal score.
#
# This filter is registered by praxis-ai-proxy, not Praxis core, because
# it encodes AI/Grid-specific routing semantics.
#
# Usage:
#   cargo run -p praxis-ai-proxy -- -c examples/configs/grid-route-inference.yaml

listeners:
  - name: proxy
    address: "0.0.0.0:8080"
    filter_chains:
      - main

filter_chains:
  - name: main
    filters:
      # Extract model name from the JSON body into a request header.
      - filter: json_body_field
        field: model
        header: X-Model

      # Route to the cluster that serves the requested model.
      # Selects by highest score: fresh > stale, local > remote.
      - filter: grid_route
        local_site: site-a
        model_header: X-Model
        candidates:
          - kind: inference_model
            name: granite-3.3-8b
            site: site-a
            cluster: granite-local
            fresh: true

          - kind: inference_model
            name: llama-3.2-8b
            site: site-b
            cluster: llama-remote
            fresh: true

      # Forward to whichever cluster grid_route selected.
      - filter: load_balancer
        clusters:
          - name: granite-local
            endpoints:
              - "127.0.0.1:8001"
          - name: llama-remote
            endpoints:
              - "127.0.0.1:8002"

admin:
  address: "127.0.0.1:9901"
shutdown_timeout_secs: 5
