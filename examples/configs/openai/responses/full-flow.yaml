# Responses API Full Flow
#
# Combines conversations, format classification, request validation,
# file resolution, and backend routing into a single pipeline. This
# is the unified config that operators would deploy for a Responses
# API gateway:
#
#   1. openai_conversations handles CRUD for the Conversations API
#      (/v1/conversations) and sets has_conversation metadata when
#      a Responses request carries a conversation field. On the
#      response path it appends input+output items back to the
#      conversation after a successful non-streaming response.
#
#   2. openai_responses_format classifies the request and promotes
#      format, model, stream, and mode to internal routing headers.
#      on_invalid is left at the default (passthrough) so that
#      Conversations API traffic is not rejected before the
#      conversations filter can handle it in the body phase.
#
#   3. openai_responses_validate checks parameter combinations
#      (stream+background, background+store), generates response
#      and conversation IDs, and writes responses.* metadata for
#      downstream filters. Skips non-Responses requests gracefully.
#
#   4. openai_tool_parse parses the tools array and tool_choice from
#      Responses API requests and promotes summary facts (has_tools,
#      has_web_search, tool_choice, function_count, etc.) to
#      metadata and filter results. Does not mutate the request body.
#
#   5. openai_response_store persists non-streaming responses to
#      SQLite and registers the store backend so downstream filters
#      (rehydrate, compact) can read from it.
#
#   6. openai_stream_events accumulates SSE events from streaming
#      responses for downstream consumption.
#
#   7. openai_responses_rehydrate loads conversation context from
#      previous_response_id or conversation field by fetching
#      stored responses/conversations and prepending their message
#      history to the current request. previous_response_id takes
#      precedence when both are present.
#
#   8. openai_file_resolve resolves file_id references in the current
#      input and rehydrated history through a configured Files API.
#      Runs after rehydrate so stored history is available, and before
#      responses_proxy so the rebuilt upstream body contains file_data
#      or image_url rather than stale file_id references.
#
#   9. openai_doc_extract converts input_file content parts to
#      input_text for backends that do not natively support input_file
#      (e.g. vLLM, llm-d). Text-safe content (text/*, application/json,
#      application/xml) is decoded from base64, validated as UTF-8, and
#      forwarded as plain text. Unsupported formats are left unchanged
#      (on_unsupported: continue). This filter is optional — omit it
#      when the inference backend natively supports input_file.
#
#   10. openai_mcp_tool_resolve resolves MCP tool entries from the tools
#      array by calling tools/list on each upstream MCP server.
#      Runs after rehydrate so previous_tools is available for
#      cross-request caching. Writes mcp_tool_map to
#      ResponsesState for downstream tool dispatch.
#
#   11. openai_responses_proxy reads the assembled ResponsesState and
#      rebuilds the outbound request body with the full conversation
#      history. Strips previous_response_id and conversation
#      (already resolved by rehydrate). Passthrough when no
#      ResponsesState exists.
#
#   12. The router sends all valid Responses API create requests and
#      GET /v1/responses WebSocket upgrades to the same inference
#      backend, while /v1/prompts, /v1/embeddings, and
#      /v1/vector_stores use dedicated services. The promoted mode
#      remains available for HTTP create requests; WebSocket
#      handshakes are format-only and have no mode.
#
# Security: StreamBuffer body callouts run before this listener's
# header-phase filters. Deploy this example behind an outer
# authentication and authorization boundary before enabling the
# required allow_pre_security_callout acknowledgement below.
#
# A request is stateful when any of these hold:
#   - previous_response_id is set
#   - tools array is non-empty
#   - store is true (the OpenAI spec default when omitted)
#   - background is true
#   - conversation is set
#   - prompt.id is set
#
# Example requests:
#
#   # Stateful (store defaults to true) — validated and routed
#   curl -X POST http://localhost:8080/v1/responses \
#     -H "Content-Type: application/json" \
#     -d '{"model":"gpt-4.1","input":"Hello, world!"}'
#
#   # Stateless (store=false, no stateful markers) — validated and routed
#   curl -X POST http://localhost:8080/v1/responses \
#     -H "Content-Type: application/json" \
#     -d '{"model":"gpt-4.1","input":"Hello","store":false}'
#
#   # Multi-turn with previous_response_id
#   curl -X POST http://localhost:8080/v1/responses \
#     -H "Content-Type: application/json" \
#     -d '{"model":"gpt-4.1","input":"What next?","previous_response_id":"resp_abc"}'
#
#   # Multi-turn with conversation
#   curl -X POST http://localhost:8080/v1/responses \
#     -H "Content-Type: application/json" \
#     -d '{"model":"gpt-4.1","input":"What next?","conversation":"conv_abc"}'
#
#   # File reference resolved through the configured Files API
#   curl -X POST http://localhost:8080/v1/responses \
#     -H "Content-Type: application/json" \
#     -H "Authorization: Bearer token" \
#     -d '{"model":"gpt-4.1","input":[{"type":"message","role":"user","content":[{"type":"input_file","file_id":"file_abc"}]}]}'
#
#   # Rejected (stream + background conflict)
#   curl -X POST http://localhost:8080/v1/responses \
#     -H "Content-Type: application/json" \
#     -d '{"model":"gpt-4.1","input":"test","stream":true,"background":true}'
#
#   # Responses WebSocket (requires a WebSocket-capable backend)
#   websocat -H="Authorization: Bearer $OPENAI_API_KEY" \
#     ws://localhost:8080/v1/responses
#
# Listener and cluster transport timeouts are intentionally omitted.
# Configured downstream read and upstream idle/read/write timeouts remain
# active after a 101 upgrade and can terminate long-lived WebSockets.
#
# Direct OpenAI upstream variant:
#   - Replace the local inference-backend endpoint with api.openai.com:443 and
#     configure tls.sni: api.openai.com.
#   - Add this headers filter after the router to replace the downstream Host:
#
#       - filter: headers
#         request_set:
#           - name: Host
#             value: api.openai.com
#
#   - Either pass through the client's Authorization header or add this filter
#     after the router to inject a server-owned credential:
#
#       - filter: credential_injection
#         clusters:
#           - name: inference-backend
#             header: Authorization
#             env_var: OPENAI_API_KEY
#             header_prefix: "Bearer "
#
#   - Configure the inference cluster as:
#
#       - name: "inference-backend"
#         endpoints:
#           - "api.openai.com:443"
#         tls:
#           sni: api.openai.com
#
# Build:
#   cargo build -p praxis-ai-proxy

listeners:
  - name: ai-gateway
    address: "127.0.0.1:8080"
    filter_chains: [responses-pipeline]

filter_chains:
  - name: responses-pipeline
    filters:
      - filter: openai_conversations
        backend: sqlite
        database_url: "sqlite://responses.db?mode=rwc"
        conversations_table: openai_conversations
        items_table: openai_conversation_items

      - filter: openai_responses_format
        on_invalid: continue
        headers:
          format: x-praxis-ai-format
          model: x-praxis-ai-model
          stream: x-praxis-ai-stream
          mode: x-praxis-responses-mode

      - filter: openai_responses_validate

      - filter: openai_tool_parse

      - filter: openai_response_store
        backend: sqlite
        # In-memory:
        #   database_url: "sqlite::memory:"
        # File-backed:
        database_url: "sqlite://responses.db?mode=rwc"
        responses_table: openai_responses
        conversations_table: openai_conversations

      - filter: openai_stream_events

      - filter: openai_responses_rehydrate

      - filter: openai_file_resolve
        files_api_url: "http://127.0.0.1:9999"
        allow_private_files_api_url: true
        allow_pre_security_callout: true
        forward_headers:
          - authorization
          - x-tenant-id
        on_missing: reject
        timeout_ms: 10000

      - filter: openai_doc_extract
        allow_pre_security_callout: true
        on_unsupported: continue

      - filter: openai_mcp_tool_resolve

      - filter: openai_responses_proxy
        name: inference

      - filter: router
        routes:
          - path_prefix: "/v1/prompts"
            cluster: "prompts-api"
          - path_prefix: "/v1/embeddings"
            cluster: "embeddings-api"
          - path_prefix: "/v1/files"
            cluster: "files-api"
          - path: "/v1/responses"
            headers:
              x-praxis-ai-format: "openai_responses"
            cluster: "inference-backend"
          - path_prefix: "/v1/vector_stores"
            cluster: "vector-stores-backend"

      - filter: load_balancer
        clusters:
          - name: "prompts-api"
            endpoints:
              - "127.0.0.1:9998"
          - name: "embeddings-api"
            endpoints:
              - "127.0.0.1:9997"
          - name: "files-api"
            endpoints:
              - "127.0.0.1:9999"
          - name: "inference-backend"
            endpoints:
              - "127.0.0.1:3001"
          - name: "vector-stores-backend"
            endpoints:
              - "127.0.0.1:3002"
